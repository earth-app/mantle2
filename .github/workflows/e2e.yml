name: Trigger Crust E2E

on:
  push:
    branches:
      - master

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to crust
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CRUST_AUTH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/earth-app/crust/dispatches \
            -d '{"event_type":"mantle2-update"}'
