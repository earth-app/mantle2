coverage:
  status:
    project:
      default:
        target: 60%
        threshold: 2%
    patch:
      default:
        target: 50%
        threshold: 5%

comment:
  layout: 'condensed_header, condensed_files, condensed_footer'
  require_changes: true

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: unit
      paths:
        - src/
    - name: e2e-mocked
      paths:
        - src/
    - name: e2e-integration
      paths:
        - src/

ignore:
  - 'tests/**/*'
  - 'coverage/**/*'
  - 'vendor/**/*'
  - '**/*.md'
