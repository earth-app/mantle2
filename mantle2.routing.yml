  methods: [GET]

mantle2.users.current.events.images.delete_all:
  path: '/v2/users/current/events/images'
  defaults:
    _controller: '\Drupal\mantle2\Controller\EventsController::deleteUserEventImages'
    _title: 'Delete All User Event Images by Current User'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users,Events,Event Images
    description: Deletes all image submissions the user has ever made
    schema/204: No Content
    schema/401: Unauthorized
    schema/403: 403
    schema/404: User not found
  methods: [DELETE]

mantle2.users.current.events.images.get:
  path: '/v2/users/current/events/images/{eventId}'
  defaults:
    _controller: '\Drupal\mantle2\Controller\EventsController::getUserEventImage'
    _title: 'Get User Event Images for Event by Current User'
  requirements:
    _access: 'TRUE'
    eventId: '\d+'
  options:
    tags: Users,Events,Event Images
    description: Retrieves a list of image submissions for a specific event the user is hosting or attending
    schema/200: '#EventImageSubmissions'
    schema/401: Unauthorized
    schema/404: User or event not found
    parameters:
      eventId:
        type: string
    paginated: true
  methods: [GET]

mantle2.users.current.events.images.delete:
  path: '/v2/users/current/events/images/{eventId}'
  defaults:
    _controller: '\Drupal\mantle2\Controller\EventsController::deleteUserEventImage'
    _title: 'Delete User Event Images for Event by Current User'
  requirements:
    _access: 'TRUE'
    eventId: '\d+'
  options:
    tags: Users,Events,Event Images
    description: Deletes a specific image submission for a specific event the user is hosting or attending
    schema/204: No Content
    schema/401: Unauthorized
    schema/403: 403
    schema/404: User or event not found
    parameters:
      eventId:
        type: string
  methods: [DELETE]

mantle2.users.current.badges:
  path: '/v2/users/current/badges'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::badges'
    _title: 'Get User Badges by Current User'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users,Badges
    description: Retrieves a list of badges earned by the user
    schema/200: '#UserBadges'
    schema/404: User not found
  methods: [GET]

mantle2.users.current.badges.get:
  path: '/v2/users/current/badges/{badgeId}'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::badge'
    _title: 'Get User Badge by Current User'
  requirements:
    _access: 'TRUE'
    badgeId: '[a-z0-9_]+'
  options:
    tags: Users,Badges
    description: Retrieves a specific badge earned by the user
    schema/200: '#UserBadge'
    schema/404: User or badge not found
    parameters:
      badgeId:
        type: string
  methods: [GET]

mantle2.users.current.badges.mastery:
  path: '/v2/users/current/badges/{badgeId}/mastery'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::badgeMastery'
    _title: 'Get Badge Mastery Status by Current User'
  requirements:
    _access: 'TRUE'
    badgeId: '[a-z0-9_]+'
  options:
    tags: Users,Badges
    description: Retrieves the badge mastery status for the current user
    schema/200: '#BadgeMastery'
    schema/401: Unauthorized
    schema/404: User or badge not found
    parameters:
      badgeId:
        type: string
  methods: [GET]

mantle2.users.current.badges.mastery.generate:
  path: '/v2/users/current/badges/{badgeId}/mastery/generate'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::generateBadgeMastery'
    _title: 'Generate Badge Mastery Quest by Current User'
  requirements:
    _access: 'TRUE'
    badgeId: '[a-z0-9_]+'
  options:
    tags: Users,Badges,Quests
    description: Generates an AI-driven mastery quest for the badge
    schema/201: '#Quest'
    schema/400: Badge does not support mastery quests, or active mastery cap reached
    schema/401: Unauthorized
    schema/409: Badge not granted, already generated, or already mastered
    schema/410: Mastery permanently locked
    schema/500: Mastery generation failed; please try again
    parameters:
      badgeId:
        type: string
  methods: [POST]

mantle2.users.current.badges.masteries:
  path: '/v2/users/current/badges/masteries'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::badgesMasteries'
    _title: 'List User Active Badge Masteries by Current User'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users,Badges,Quests
    description: Lists the user's stored mastery quests (active + within ttl) plus cap state
    schema/200: '#MasteryList'
    schema/401: Unauthorized
  methods: [GET]

mantle2.users.current.impact_points:
  path: '/v2/users/current/points'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::points'
    _title: 'Get User Impact Points by Current User'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users,Impact Points
    description: Retrieves the total impact points accumulated by the user
    schema/200: '#ImpactPoints'
    schema/404: User not found
  methods: [GET]

mantle2.users.current.referral:
  path: '/v2/users/current/referral'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::referral'
    _title: 'Get User Referral Code by Current User'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users,Referral
    description: Retrieves the referral code for the user (self or admin only)
    schema/200: '#ReferralCode'
    schema/401: Unauthorized
    schema/404: User not found
  methods: [GET]

mantle2.users.current.referral.stats:
  path: '/v2/users/current/referral/stats'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::referralStats'
    _title: 'Get User Referral Stats by Current User'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users,Referral
    description: Retrieves referral stats (clicks, conversions) for the user (self or admin only)
    schema/200: '#ReferralStats'
    schema/401: Unauthorized
    schema/404: User not found
  methods: [GET]

mantle2.users.current.leaderboard:
  path: '/v2/users/current/leaderboard'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::userLeaderboard'
    _title: 'Get User Leaderboard by Current User'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users,Leaderboards
    description: Retrieves a friendly-competition leaderboard scoped to global, friends, or circle
    schema/200: '#Leaderboard'
    schema/400: Bad Request
    schema/401: Unauthorized
    schema/404: User not found
    query:
      type:
        type: enum
        default: points
        description: The metric to rank by
        enum: [points, article, prompt, event]
      scope:
        type: enum
        default: friends
        description: The set of users to rank
        enum: [global, friends, circle]
      limit:
        type: integer
        minimum: 1
        maximum: 250
        default: 25
        description: The number of results to return
  methods: [GET]

mantle2.users.current.quest:
  path: '/v2/users/current/quest'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::userQuests'
    _title: 'Get User Quest by Current User'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users,Quests
    description: Retrieves the current quest progress for the user
    schema/200: '#QuestData'
    schema/401: Unauthorized
    schema/404: User not found
  methods: [GET]

mantle2.users.current.quest.step:
  path: '/v2/users/current/quest/step/{step}'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::userQuestStep'
    _title: 'Get User Quest Step by Current User'
  requirements:
    _access: 'TRUE'
    step: '\d+'
  options:
    tags: Users,Quests
    description: Retrieves the progress details for a specific quest step
    schema/200: '#QuestProgressEntry'
    schema/400: Missing step parameter
    schema/401: Unauthorized
    schema/404: User not found
    parameters:
      step:
        type: integer
  methods: [GET]

mantle2.users.current.quest.start:
  path: '/v2/users/current/quest'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::startQuest'
    _title: 'Start Quest by Current User'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users,Quests
    description: Start a new quest for the user. Use override=true to discard any ongoing quest
    schema/200: '#MessageResponse'
    schema/400: Bad request or quest already in progress
    schema/401: Unauthorized
    schema/409: Quest already in progress
    schema/404: User not found
    query:
      quest_id:
        type: string
        required: true
        description: The ID of the quest to start
      override:
        type: boolean
        default: false
        description: If true, discard any ongoing quest and start this one instead
  methods: [POST]

mantle2.users.current.quest.challenge:
  path: '/v2/users/current/quest/challenge'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::challengeFriendToQuest'
    _title: 'Challenge Friend to Quest by Current User'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users,Quests
    description: Challenge a friend to a quest; sends a templated notification (friends only) and creates a co-op challenge record
    schema/201: '#ChallengeView'
    schema/400: Bad Request
    schema/401: Unauthorized
    schema/403: You can only challenge friends
    schema/404: Friend not found
    schema/409: Already challenged or rate limited
    query:
      friend:
        type: string
        required: true
        description: The ID or Username of the friend to challenge
      quest:
        type: string
        required: true
        description: The ID of the quest to challenge the friend to
  methods: [POST]

mantle2.users.current.quest.challenge.get:
  path: '/v2/users/current/quest/challenge'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::getQuestChallenge'
    _title: 'Get Quest Challenge by Current User'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users,Quests
    description: Get the active or pending co-op challenge for the user on a quest, enriched with the other participant's progress
    schema/200: '#ChallengeView'
    schema/400: Bad Request
    schema/401: Unauthorized
    schema/404: User not found
    query:
      quest:
        type: string
        required: true
        description: The ID of the quest to look up the challenge for
  methods: [GET]

mantle2.users.current.quest.challenge.accept:
  path: '/v2/users/current/quest/challenge/{challengeId}/accept'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::acceptQuestChallenge'
    _title: 'Accept Quest Challenge by Current User'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users,Quests
    description: Accept a co-op quest challenge as the recipient
    schema/200: '#Challenge'
    schema/401: Unauthorized
    schema/403: Forbidden
    schema/404: Challenge not found
    schema/409: Challenge already resolved
    parameters:
      challengeId:
        type: string
  methods: [POST]

mantle2.users.current.quest.challenge.decline:
  path: '/v2/users/current/quest/challenge/{challengeId}/decline'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::declineQuestChallenge'
    _title: 'Decline Quest Challenge by Current User'
  requirements:
    _access: 'TRUE'
