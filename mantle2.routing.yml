  requirements:
    _access: 'TRUE'
    username: '@[\w.]+'
  options:
    tags: Users,Quests
    description: Decline a co-op quest challenge as the recipient
    schema/200: '#Challenge'
    schema/401: Unauthorized
    schema/403: Forbidden
    schema/404: Challenge not found
    schema/409: Challenge already resolved
    parameters:
      username:
        type: string
      challengeId:
        type: string
  methods: [POST]

mantle2.users.username.quest.cancel:
  path: '/v2/users/{username}/quest'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::cancelQuest'
