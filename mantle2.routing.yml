# OpenAPI
mantle2.openapi:
  path: '/openapi'
  defaults:
    _controller: '\Drupal\mantle2\Controller\Schema\OpenAPIController::getSchema'
    _title: 'OpenAPI Schema'
  requirements:
    _access: 'TRUE'
  methods: [GET]
mantle2.swaggerui:
  path: '/swagger-ui'
  defaults:
    _controller: '\Drupal\mantle2\Controller\Schema\SwaggerUIController::getSwaggerUI'
    _title: 'Swagger UI'
  requirements:
    _access: 'TRUE'
  methods: [GET]

# Routes
mantle2.hello:
  path: /v2/hello
  defaults:
    _controller: '\Drupal\mantle2\Controller\GeneralController::hi'
    _title: 'Hello!'
  requirements:
    _access: 'TRUE'
  options:
    tags: General
    description: Say hi to mantle2
    schema/200/type: text/plain
  methods: [GET]

mantle2.info:
  path: /v2/info
  defaults:
    _controller: '\Drupal\mantle2\Controller\GeneralController::getInfo'
    _title: 'Module Information'
  requirements:
    _access: 'TRUE'
  options:
    tags: General
    description: Retrieve information about the mantle2 Module
  methods: [GET]

# MOTD

mantle2.motd.get:
  path: /v2/motd
  defaults:
    _controller: '\Drupal\mantle2\Controller\GeneralController::getMotd'
    _title: 'Get Message of the Day'
  requirements:
    _access: 'TRUE'
  options:
    tags: General
    description: Retrieve the current Message of the Day (MOTD)
    schema/200: '#MotdResponse'
  methods: [GET]

mantle2.motd.set:
  path: /v2/motd
  defaults:
    _controller: '\Drupal\mantle2\Controller\GeneralController::setMotd'
    _title: 'Set Message of the Day [Admin Only]'
  requirements:
    _access: 'TRUE'
  options:
    tags: General,Admin
    description: Set the Message of the Day (MOTD)
    schema/201: '#MotdResponse'
  methods: [POST]

## User Routes
mantle2.users:
  path: '/v2/users'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::users'
    _title: 'Retrieve User List'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users
    description: Retrieves a list of Earth App users
    schema/200: '#Users'
    schema/400: Invalid Pagination Parameters
    paginated: true
    query:
      sort:
        default: asc
  methods: [GET]

mantle2.users.login:
  path: '/v2/users/login'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::login'
    _title: 'User Login'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users
    description: Log in to your Earth App account
    schema/200: '#LoginResponse'
    schema/202: '#LoginVerificationRequired'
    schema/400: Invalid login credentials
    schema/401: Unauthorized
    schema/403: Account Disabled
    schema/429: Rate limit exceeded (verification code requested too frequently)
  methods: [POST]

mantle2.users.login.verify_new_ip:
  path: '/v2/users/login/verify_new_ip'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::verifyLoginNewIP'
    _title: 'Verify New-IP Login'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users
    description: Complete login when signing in from a new Ip
    schema/200: '#LoginResponse'
    schema/400: Missing/invalid ticket or code, or code attempts exhausted
    schema/403: Account Disabled
    query:
      ticket:
        type: string
        required: true
        description: Opaque ticket returned by /v2/users/login when verification is required
      code:
        type: string
        required: true
        pattern: '^\d{8}$'
        description: 8-digit verification code received via email
        example: '12345678'
  methods: [POST]

mantle2.users.logout:
  path: '/v2/users/logout'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::logout'
    _title: 'User Logout'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users
    description: Log out of your Earth App account
    schema/200: '#LogoutResponse'
    schema/401: Unauthorized
  methods: [POST]

mantle2.users.create:
  path: '/v2/users/create'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::createUser'
    _title: 'Create User'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users
    description: Sign up for an Earth App account
    schema/201: '#SignupResponse'
    schema/400: Bad User Data
  methods: [POST]

mantle2.users.reset_password:
  path: '/v2/users/reset_password'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::resetPassword'
    _title: 'Reset Password'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users
    description: Initiate password reset for a user by email
    schema/204: No Content
    schema/400: Bad request
    schema/429: Rate limit exceeded
    parameters:
      email:
        name: email
        in: query
        required: true
        description: Email address of user to reset password for
        schema:
          type: string
          format: email
  methods: [POST]

mantle2.users.unsubscribe:
  path: '/v2/users/unsubscribe'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::publicUnsubscribe'
    _title: 'Unsubscribe from Emails'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users
    description: Unsubscribe from email notifications using a secure token (no authentication required)
    schema/200: '#SubscriptionResponse'
    schema/400: Invalid or expired token
    parameters:
      token:
        name: token
        in: query
        required: true
        description: Secure unsubscribe token from email
        schema:
          type: string
  methods: [GET, POST]

mantle2.users.badges:
  path: '/v2/users/badges'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::allBadges'
    _title: 'All Badges'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users,Badges
    description: Retrieves a list of all badges
    schema/200: '#Badges'
  methods: [GET]

mantle2.users.cosmetics:
  path: '/v2/users/cosmetics'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::getCosmeticsCatalog'
    _title: 'Get Cosmetics Catalog'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users
    description: Retrieve catalog of all available profile photo cosmetics with their prices and rarities
    schema/200: '#CosmeticsCatalog'
  methods: [GET]

mantle2.users.cosmetics.preview:
  path: '/v2/users/cosmetics/preview'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::previewCosmetic'
    _title: 'Preview Cosmetic'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users
    description: Preview a cosmetic filter applied to the cloud user profile photo, or the authenticated user's own photo when withSelf=true
    schema/200/type: image/png
    schema/parameters:
      cosmetic:
        type: string
        required: true
        description: The cosmetic key to preview
      size:
        type: integer
        enum: [32, 128, 1024]
        default: 1024
        description: The size of the preview image. Must be one of 32, 128, or 1024.
      withSelf:
        type: boolean
        default: false
        description: When true and the request is authenticated, the preview is rendered against the requester's own profile photo.
  methods: [GET]

# Quests

mantle2.users.quests:
  path: '/v2/users/quests'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::quests'
    _title: 'Get All Quests'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users,Quests
    description: Retrieves a list of all available quests, or a specific quest if id parameter is provided
    schema/200: '#QuestsList'
    schema/404: Quest not found (only when id parameter is provided)
    query:
      id:
        type: string
        description: Optional quest ID to retrieve a specific quest
  methods: [GET]

