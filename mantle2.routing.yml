mantle2.users.username.leaderboard:
  path: '/v2/users/{username}/leaderboard'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::userLeaderboard'
    _title: 'Get User Leaderboard by Username'
  requirements:
    _access: 'TRUE'
    username: '@[\w.]+'
  options:
    tags: Users,Leaderboards
    description: Retrieves a friendly-competition leaderboard scoped to global, friends, or circle
