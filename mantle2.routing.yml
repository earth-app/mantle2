#region User - By ID
mantle2.users.id.get:
  path: '/v2/users/{id}'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::getUser'
    _title: 'Retrieve User by ID'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users
    description: Retrieves user information by their identifier
    schema/200: '#User'
    schema/404: User not found
    parameters:
      id:
        type: string
  methods: [GET]

mantle2.users.id.patch:
  path: '/v2/users/{id}'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::patchUser'
    _title: 'Update User by ID'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users
    description: Updates user information by their identifier
    schema/200: '#User'
    schema/401: Unauthorized
    schema/403: 403
    schema/404: User not found
    body/description: User data to update
    body/schema: userUpdateJson()
    parameters:
      id:
        type: string
  methods: [PATCH]

mantle2.users.id.delete:
  path: '/v2/users/{id}'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::deleteUser'
    _title: 'Delete User by ID'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users
    schema/204: User deleted successfully
    schema/401: Unauthorized
    schema/403: 403
    schema/404: User not found
    parameters:
      id:
        type: string
  methods: [DELETE]

mantle2.users.id.patch_field_privacy:
  path: '/v2/users/{id}/field_privacy'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::patchFieldPrivacy'
    _title: 'Edit User Field Privacy by ID'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users
    description: Updates user field privacy settings by their identifier
    schema/200: '#User'
    schema/401: Unauthorized
    schema/403: 403
    schema/404: User not found
    body/description: User privacy field options
    body/schema: userFieldPrivacyJson()
    parameters:
      id:
        type: string
  methods: [PATCH]

mantle2.users.id.get_profile_photo:
  path: '/v2/users/{id}/profile_photo'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::getProfilePhoto'
    _title: 'Get User Profile Photo by ID'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users
    description: Retrieves the profile photo of a user by their identifier
    schema/200/type: image/png
    schema/403: Account Disabled
    schema/404: User not found
    parameters:
      id:
        type: string
    query:
      size:
        type: integer
        enum: [32, 128, 1024]
        default: 1024
        description: The size of the profile photo to retrieve. Must be one of 32, 128, or 1024.
  methods: [GET]

mantle2.users.id.set_profile_photo:
  path: '/v2/users/{id}/profile_photo'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::updateProfilePhoto'
    _title: 'Set User Profile Photo by ID'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users
    description: Updates the profile photo of a user by their identifier
    schema/200/type: image/png
    schema/401: Unauthorized
    schema/403: 403
    schema/404: User not found
    parameters:
      id:
        type: string
  methods: [PUT]

mantle2.users.id.profile_photo.cosmetic.get:
  path: '/v2/users/{id}/profile_photo/cosmetic'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::getUserCosmetics'
    _title: 'Get User Cosmetics by ID'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users
    description: Get unlocked cosmetics and currently selected cosmetic for user
    schema/200: '#UserCosmetics'
    schema/401: Unauthorized
    schema/404: User not found
  methods: [GET]

mantle2.users.id.profile_photo.cosmetic.set:
  path: '/v2/users/{id}/profile_photo/cosmetic'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::setUserCosmetic'
    _title: 'Set User Cosmetic by ID'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users
    description: Set the currently selected profile photo cosmetic
    body/description: Cosmetic selection data
    body/schema: setCosmeticBodyJson()
    schema/200: '#UserCosmetics'
    schema/400: Bad request
    schema/401: Unauthorized
    schema/404: User not found
  methods: [PUT]

mantle2.users.id.profile_photo.purchase_cosmetic:
  path: '/v2/users/{id}/profile_photo/purchase_cosmetic'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::purchaseCosmetic'
    _title: 'Purchase Cosmetic by ID'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users
    description: Purchase a profile photo cosmetic with impact points
    schema/200: '#CosmeticPurchaseResponse'
    schema/400: Bad request
    schema/401: Unauthorized
    schema/404: User not found
    query:
      key:
        type: string
        description: The key of the cosmetic to purchase
  methods: [POST]

mantle2.users.id.profile_photo.cache.clear:
  path: '/v2/users/{id}/profile_photo/cache'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::clearProfilePhotoCache'
    _title: 'Clear Profile Photo Cache by ID'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users
    description: Flush cached profile photo entries (base + every cosmetic variant) for the user.
    schema/200: '#MessageResponse'
    schema/401: Unauthorized
    schema/403: 403
    schema/404: User not found
  methods: [DELETE]

mantle2.users.id.set_account_type:
  path: '/v2/users/{id}/account_type'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::setAccountType'
    _title: 'Set User Account Type by ID [Admin Only]'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users,Admin
    description: Updates user account type by their identifier
    schema/200: '#User'
    schema/401: Unauthorized
    schema/403: 403
    schema/404: User not found
    parameters:
      id:
        type: string
    query:
      type:
        type: enum
        required: true
        enum: [free, pro, writer, organizer, administrator]
        description: The account type to assign to the user
  methods: [PUT]

mantle2.users.id.create_account_type_trial:
  path: '/v2/users/{id}/account_type/trial'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::createTypeTrial'
    _title: 'Create User Account Type Trial by ID [Admin Only]'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users,Admin
    description: Creates a temporary account type trial by user identifier
    schema/200: '#MessageResponse'
    schema/401: Unauthorized
    schema/403: 403
    schema/404: User not found
    parameters:
      id:
        type: string
    query:
      type:
        type: enum
        required: true
        enum: [free, pro, writer, organizer, administrator]
        description: The account type to trial for the user
      days:
        type: integer
        required: false
        description: Trial duration in days (1-90). Default 7
  methods: [PUT]

mantle2.users.id.activities:
  path: '/v2/users/{id}/activities'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::userActivities'
    _title: 'Get User Activities by ID'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users,Activities
    description: Retrieves user activities by their identifier
    schema/200: '#ActivitiesList'
    schema/404: User not found
    parameters:
      id:
        type: string
  methods: [GET]

mantle2.users.id.activities.set:
  path: '/v2/users/{id}/activities'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::setUserActivities'
    _title: 'Set User Activities by ID'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users,Activities
    description: Updates user activities by their identifier
    body/description: List of activity IDs to set for the user
    body/schema: activitiesIdList()
    schema/200: '#User'
    schema/401: Unauthorized
    schema/403: 403
    schema/404: User not found
    parameters:
      id:
        type: string
  methods: [PATCH]

mantle2.users.id.activities.add:
  path: '/v2/users/{id}/activities'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::addUserActivity'
    _title: 'Add User Activity by ID'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users,Activities
    description: Updates user activities by their identifier
    schema/200: '#User'
    schema/401: Unauthorized
    schema/403: 403
    schema/404: User not found
    schema/409: Activity already added to user
    query:
      activityId:
        type: string
        description: The ID of the activity to add for the user
    parameters:
      id:
        type: string
  methods: [PUT]

mantle2.users.id.activities.remove:
  path: '/v2/users/{id}/activities'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::removeUserActivity'
    _title: 'Remove User Activity by ID'
  requirements:
    _access: 'TRUE'
    id: '\d+'
    activityId: '\d+'
  options:
    tags: Users,Activities
    description: Removes a user activity by their identifier
    schema/200: '#User'
    schema/401: Unauthorized
    schema/403: 403
    schema/404: User or activity not found
    parameters:
      id:
        type: string
    query:
      activityId:
        type: string
        description: The ID of the activity to remove for the user
  methods: [DELETE]

mantle2.users.id.activities.recommend:
  path: '/v2/users/{id}/activities/recommend'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::recommendUserActivities'
    _title: 'Recommend Activities for User by ID'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users,Activities
    description: Recommends activities for the user by their identifier
    schema/200: '#ActivitiesList'
    schema/404: User not found
    parameters:
      id:
        type: string
  methods: [GET]

mantle2.users.id.friends:
  path: '/v2/users/{id}/friends'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::userFriends'
    _title: 'Get User Friends by ID'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Users,Friends
    description: Retrieves user friends by their identifier
    schema/200: '#Users'
    schema/400: Bad Request
    schema/404: User not found
    query:
      limit:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
        description: The number of results to return per page
      page:
        type: integer
        minimum: 1
        default: 1
        description: The page number to retrieve
      search:
        type: string
        default: ''
        description: The search term to filter results
      filter:
        type: enum
        description: The type of friends to return. Mutual friends, added friends, users who have added you, or non-mutual friends (friends you have added that are not mutual).
        enum: [mutual, added, added_by, non_mutual]
    parameters:
      id:
        type: string
  methods: [GET]

