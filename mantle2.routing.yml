  path: '/v2/webhooks/google'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::webhookGoogle'
    _title: 'Google Webhook'
  requirements:
    _access: 'TRUE'
  options:
    tags: Subscriptions
    description: Google Play Real-time Developer Notifications (Pub/Sub) receiver. Always acknowledges with 200.
    schema/200: '#WebhookAck'
  methods: [POST]

mantle2.admin.trial_codes.create:
  path: '/v2/admin/trial-codes'
  defaults:
    _controller: '\Drupal\mantle2\Controller\AdminController::createTrialCode'
    _title: 'Create Trial Code'
  requirements:
    _access: 'TRUE'
  options:
    tags: Subscriptions,Admin
    description: Creates a redeemable trial code (admin only).
    schema/201: '#TrialCode'
    schema/400: Invalid input
    schema/403: 403
    schema/409: Code already exists
    body/description: Tier, days, and optional limits/code
    body/schema: '#TrialCodeCreateJson'
  methods: [POST]

mantle2.admin.trial_codes.list:
  path: '/v2/admin/trial-codes'
  defaults:
    _controller: '\Drupal\mantle2\Controller\AdminController::listTrialCodes'
    _title: 'List Trial Codes'
  requirements:
    _access: 'TRUE'
  options:
    tags: Subscriptions,Admin
    description: Lists all trial codes (admin only).
    schema/200: '#TrialCodeList'
    schema/403: 403
  methods: [GET]

mantle2.admin.trial_codes.patch:
  path: '/v2/admin/trial-codes/{code}'
  defaults:
    _controller: '\Drupal\mantle2\Controller\AdminController::patchTrialCode'
    _title: 'Update Trial Code'
  requirements:
    _access: 'TRUE'
    code: '[A-Za-z0-9\-]{1,32}'
  options:
    tags: Subscriptions,Admin
    description: Updates a trial code (admin only).
    schema/200: '#TrialCode'
    schema/400: Invalid input
    schema/403: 403
    schema/404: Unknown code
    body/description: Subset of fields to update
    body/schema: '#TrialCodePatchJson'
    parameters:
      code:
        type: string
  methods: [PATCH]

mantle2.admin.trial_codes.delete:
  path: '/v2/admin/trial-codes/{code}'
  defaults:
    _controller: '\Drupal\mantle2\Controller\AdminController::deleteTrialCode'
    _title: 'Delete Trial Code'
  requirements:
    _access: 'TRUE'
    code: '[A-Za-z0-9\-]{1,32}'
  options:
    tags: Subscriptions,Admin
    description: Deletes a trial code (admin only).
    schema/204: Deleted
    schema/403: 403
    schema/404: Unknown code
    parameters:
      code:
        type: string
  methods: [DELETE]

mantle2.admin.users.refund:
  path: '/v2/admin/users/{id}/refund'
  defaults:
    _controller: '\Drupal\mantle2\Controller\AdminController::refundUser'
    _title: 'Refund User Subscription'
  requirements:
    _access: 'TRUE'
    id: '\d+'
  options:
    tags: Subscriptions,Admin
    description: Refunds and cancels a user's subscription, reverting them to Free (admin only).
    schema/200: '#CancelResult'
    schema/403: 403
    schema/404: No subscription found
    body/description: Optional reason
    body/schema: '#AdminRefundJson'
    parameters:
      id:
        type: string
  methods: [POST]

# #endregion
