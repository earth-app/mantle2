        type: integer
  methods: [GET]

mantle2.users.username.quest.start:
  path: '/v2/users/{username}/quest'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::startQuest'
    _title: 'Start Quest by Username'
  requirements:
    _access: 'TRUE'
    username: '@[\w.]+'
  options:
    tags: Users,Quests
    description: Start a new quest for the user. Use override=true to discard any ongoing quest
    schema/200: '#MessageResponse'
    schema/400: Bad request or quest already in progress
    schema/401: Unauthorized
    schema/409: Quest already in progress
    schema/404: User not found
    parameters:
      username:
        type: string
    query:
      quest_id:
        type: string
        required: true
        description: The ID of the quest to start
      override:
        type: boolean
        default: false
        description: If true, discard any ongoing quest and start this one instead
  methods: [POST]

mantle2.users.username.quest.challenge:
  path: '/v2/users/{username}/quest/challenge'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::challengeFriendToQuest'
    _title: 'Challenge Friend to Quest by Username'
  requirements:
    _access: 'TRUE'
    username: '@[\w.]+'
  options:
    tags: Users,Quests
    description: Challenge a friend to a quest; sends a templated notification (friends only) and creates a co-op challenge record
    schema/201: '#ChallengeView'
    schema/400: Bad Request
    schema/401: Unauthorized
    schema/403: You can only challenge friends
    schema/404: Friend not found
    schema/409: Already challenged or rate limited
    parameters:
      username:
        type: string
    query:
      friend:
        type: string
        required: true
        description: The ID or Username of the friend to challenge
      quest:
        type: string
        required: true
        description: The ID of the quest to challenge the friend to
  methods: [POST]

mantle2.users.username.quest.challenge.get:
