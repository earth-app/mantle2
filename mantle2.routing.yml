    paginated: true
  methods: [GET]

mantle2.users.current.events.images:
  path: '/v2/users/current/events/images'
  defaults:
    _controller: '\Drupal\mantle2\Controller\EventsController::getUserEventImages'
    _title: 'Get User Event Images by Current User'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users,Events,Event Images
    description: Retrieves a list of image submissions for events the user is hosting or attending
    schema/200: '#EventImageSubmissions'
    schema/401: Unauthorized
    schema/404: User not found
