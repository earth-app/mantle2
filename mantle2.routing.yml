    description: Cancel the current quest for the user
    schema/200: '#MessageResponse'
    schema/401: Unauthorized
    schema/409: No ongoing quest to cancel
    schema/404: User not found
    parameters:
      username:
        type: string
  methods: [DELETE]

mantle2.users.username.quest.history:
  path: '/v2/users/{username}/quest/history'
  defaults:
    _controller: '\Drupal\mantle2\Controller\UsersController::questHistory'
    _title: 'Get User Quest History by Username'
  requirements:
    _access: 'TRUE'
    username: '@[\w.]+'
  options:
    tags: Users,Quests
    description: Retrieves the paginated list of completed quests for the user
    schema/200: '#QuestHistoryResponse'
    schema/401: Unauthorized
    schema/404: User not found
    paginated: true
    query:
      sort:
