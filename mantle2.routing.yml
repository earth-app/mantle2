    schema/400: Bad Request
    schema/401: Unauthorized
    schema/404: User not found
    parameters:
      username:
        type: string
    query:
      type:
        type: enum
        default: points
        description: The metric to rank by
        enum: [points, article, prompt, event]
      scope:
        type: enum
        default: friends
        description: The set of users to rank
        enum: [global, friends, circle]
      limit:
        type: integer
        minimum: 1
        maximum: 250
        default: 25
        description: The number of results to return
  methods: [GET]

mantle2.users.username.quest:
