  defaults:
    _controller: '\Drupal\mantle2\Controller\EventsController::getUserEvents'
    _title: 'Get Current User Attending Events'
  requirements:
    _access: 'TRUE'
  options:
    tags: Users,Events
    description: 'Retrieves events the current user is hosting or attending'
    schema/200: '#Events'
