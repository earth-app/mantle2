cache:
  retrievals:
    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)$'
      methods: [GET]
      key_template: 'request_cache:user:profile:{uid}:req:{req_uid}'
      ttl: 180

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/profile_photo$'
      methods: [GET]
      key_template: 'request_cache:user:photo:{uid}:size:{size}'
      ttl: 1800

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/activities$'
      methods: [GET]
      key_template: 'request_cache:user:activities:{uid}'
      ttl: 300

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/friends$'
      methods: [GET]
      key_template: 'request_cache:user:friends:{uid}:req:{req_uid}:p:{page}:l:{limit}:s:{search}:sort:{sort}'
      ttl: 120

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/circle$'
      methods: [GET]
      key_template: 'request_cache:user:circle:{uid}:req:{req_uid}:p:{page}:l:{limit}:s:{search}:sort:{sort}'
      ttl: 120

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/notifications$'
      methods: [GET]
      key_template: 'request_cache:user:notifications:{uid}:p:{page}:l:{limit}:read:{read}'
      ttl: 30

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/prompts$'
      methods: [GET]
      key_template: 'request_cache:user:prompts:{uid}:req:{req_uid}:p:{page}:l:{limit}:s:{search}:sort:{sort}'
      ttl: 300

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/articles$'
      methods: [GET]
      key_template: 'request_cache:user:articles:{uid}:req:{req_uid}:p:{page}:l:{limit}:s:{search}:sort:{sort}'
      ttl: 300

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/events$'
      methods: [GET]
      key_template: 'request_cache:user:events:{uid}:req:{req_uid}:p:{page}:l:{limit}:s:{search}:sort:{sort}'
      ttl: 300

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/events/images/([0-9]+)$'
      methods: [GET]
      key_template: 'request_cache:user:event_images:{uid}:eid:{eid}:req:{req_uid}:p:{page}:l:{limit}:s:{search}:sort:{sort}'
      ttl: 600

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/events/attending$'
      methods: [GET]
      key_template: 'request_cache:user:events_attending:{uid}:req:{req_uid}:p:{page}:l:{limit}:s:{search}:sort:{sort}'
      ttl: 180

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/events/images$'
      methods: [GET]
      key_template: 'request_cache:user:event_images:{uid}:req:{req_uid}:p:{page}:l:{limit}'
      ttl: 600

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/badges$'
      methods: [GET]
      key_template: 'request_cache:user:badges:{uid}'
      ttl: 600

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/points$'
      methods: [GET]
      key_template: 'request_cache:user:points:{uid}'
      ttl: 180

    - route: '^/v2/users$'
      methods: [GET]
      key_template: 'request_cache:users:list:req:{req_uid}:p:{page}:l:{limit}:s:{search}:sort:{sort}:act:{activities}'
      ttl: 60

    - route: '^/v2/prompts$'
      methods: [GET]
      key_template: 'request_cache:prompts:list:req:{req_uid}:p:{page}:l:{limit}:s:{search}:sort:{sort}'
      ttl: 120

    - route: '^/v2/prompts/([0-9]+)$'
      methods: [GET]
      key_template: 'request_cache:prompt:{pid}:req:{req_uid}'
      ttl: 300

    - route: '^/v2/prompts/([0-9]+)/responses$'
      methods: [GET]
      key_template: 'request_cache:prompt:responses:{pid}:req:{req_uid}:p:{page}:l:{limit}:sort:{sort}'
      ttl: 120

    - route: '^/v2/articles$'
      methods: [GET]
      key_template: 'request_cache:articles:list:req:{req_uid}:p:{page}:l:{limit}:s:{search}:sort:{sort}'
      ttl: 180

    - route: '^/v2/articles/([0-9]+)$'
      methods: [GET]
      key_template: 'request_cache:article:{aid}:req:{req_uid}'
      ttl: 300

    - route: '^/v2/events$'
      methods: [GET]
      key_template: 'request_cache:events:list:req:{req_uid}:p:{page}:l:{limit}:s:{search}:sort:{sort}:type:{type}'
      ttl: 120

    - route: '^/v2/events/([0-9]+)$'
      methods: [GET]
      key_template: 'request_cache:event:{eid}:req:{req_uid}'
      ttl: 180

    - route: '^/v2/events/([0-9]+)/attendees$'
      methods: [GET]
      key_template: 'request_cache:event:attendees:{eid}:p:{page}:l:{limit}'
      ttl: 120

    - route: '^/v2/events/([0-9]+)/images$'
      methods: [GET]
      key_template: 'request_cache:event:images:{eid}:req:{req_uid}'
      ttl: 600

    - route: '^/v2/activities$'
      methods: [GET]
      key_template: 'request_cache:activities:list'
      ttl: 3600

    - route: '^/v2/users/badges$'
      methods: [GET]
      key_template: 'request_cache:badges:list'
      ttl: 3600

    - route: '^/v2/users/cosmetics$'
      methods: [GET]
      key_template: 'request_cache:cosmetics:list'
      ttl: 3600

    - route: '^/v2/users/cosmetics/preview$'
      methods: [GET]
      key_template: 'request_cache:cosmetics:preview:c:{cosmetic}:size:{size}'
      ttl: 3600

  updates:
    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)$'
      methods: [PATCH]
      invalidate_patterns:
        - 'request_cache:user:profile:{uid}:*'
        - 'request_cache:users:list:*'

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/profile_photo$'
      methods: [PUT]
      invalidate_patterns:
        - 'request_cache:user:photo:{uid}:*'
        - 'request_cache:user:profile:{uid}:*'

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/account_type$'
      methods: [PUT]
      invalidate_patterns:
        - 'request_cache:user:profile:{uid}:*'
        - 'request_cache:users:list:*'

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/activities$'
      methods: [PATCH, PUT]
      invalidate_patterns:
        - 'request_cache:user:activities:{uid}'
        - 'request_cache:user:profile:{uid}:*'
        - 'request_cache:users:list:*'

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/friends$'
      methods: [PUT]
      invalidate_patterns:
        - 'request_cache:user:friends:{uid}:*'
        - 'request_cache:user:friends:{friend_uid}:*'
        - 'request_cache:user:profile:{uid}:*'
        - 'request_cache:user:profile:{friend_uid}:*'

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/circle$'
      methods: [PUT]
      invalidate_patterns:
        - 'request_cache:user:circle:{uid}:*'
        - 'request_cache:user:profile:{uid}:*'

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/field_privacy$'
      methods: [PATCH]
      invalidate_patterns:
        - 'request_cache:user:profile:{uid}:*'

    - route: '^/v2/prompts/([0-9]+)$'
      methods: [PATCH]
      invalidate_patterns:
        - 'request_cache:prompt:{pid}:*'
        - 'request_cache:prompts:list:*'
        - 'request_cache:user:prompts:*'

    - route: '^/v2/prompts/([0-9]+)/responses$'
      methods: [POST]
      invalidate_patterns:
        - 'request_cache:prompt:responses:{pid}:*'
        - 'request_cache:prompt:{pid}:*'

    - route: '^/v2/articles/([0-9]+)$'
      methods: [PATCH]
      invalidate_patterns:
        - 'request_cache:article:{aid}:*'
        - 'request_cache:articles:list:*'
        - 'request_cache:user:articles:*'

    - route: '^/v2/events/([0-9]+)$'
      methods: [PATCH]
      invalidate_patterns:
        - 'request_cache:event:{eid}:*'
        - 'request_cache:events:list:*'
        - 'request_cache:user:events:*'

    - route: '^/v2/events/([0-9]+)/(signup|leave)$'
      methods: [POST]
      invalidate_patterns:
        - 'request_cache:event:attendees:{eid}:*'
        - 'request_cache:event:{eid}:*'
        - 'request_cache:user:events_attending:*'

    - route: '^/v2/events/([0-9]+)/images$'
      methods: [POST]
      invalidate_patterns:
        - 'request_cache:event:images:{eid}:*'
        - 'request_cache:user:event_images:*'

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/notifications$'
      methods: [POST]
      invalidate_patterns:
        - 'request_cache:user:notifications:{uid}:*'

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/notifications/mark_all_(read|unread)$'
      methods: [POST]
      invalidate_patterns:
        - 'request_cache:user:notifications:{uid}:*'

  deletes:
    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)$'
      methods: [DELETE]
      invalidate_patterns:
        - 'request_cache:user:*:{uid}:*'
        - 'request_cache:users:list:*'

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/activities$'
      methods: [DELETE]
      invalidate_patterns:
        - 'request_cache:user:activities:{uid}'
        - 'request_cache:user:profile:{uid}:*'
        - 'request_cache:users:list:*'

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/friends$'
      methods: [DELETE]
      invalidate_patterns:
        - 'request_cache:user:friends:{uid}:*'
        - 'request_cache:user:friends:{friend_uid}:*'
        - 'request_cache:user:profile:{uid}:*'
        - 'request_cache:user:profile:{friend_uid}:*'

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/circle$'
      methods: [DELETE]
      invalidate_patterns:
        - 'request_cache:user:circle:{uid}:*'
        - 'request_cache:user:profile:{uid}:*'

    - route: '^/v2/prompts/([0-9]+)$'
      methods: [DELETE]
      invalidate_patterns:
        - 'request_cache:prompt:{pid}:*'
        - 'request_cache:prompts:list:*'
        - 'request_cache:user:prompts:*'

    - route: '^/v2/articles/([0-9]+)$'
      methods: [DELETE]
      invalidate_patterns:
        - 'request_cache:article:{aid}:*'
        - 'request_cache:articles:list:*'
        - 'request_cache:user:articles:*'

    - route: '^/v2/events/([0-9]+)$'
      methods: [DELETE]
      invalidate_patterns:
        - 'request_cache:event:{eid}:*'
        - 'request_cache:events:list:*'
        - 'request_cache:user:events:*'
        - 'request_cache:event:attendees:{eid}:*'
        - 'request_cache:event:images:{eid}:*'

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/notifications/([0-9]+)$'
      methods: [DELETE]
      invalidate_patterns:
        - 'request_cache:user:notifications:{uid}:*'

    - route: '^/v2/users/([0-9]+|[a-zA-Z0-9_]+)/notifications/clear$'
      methods: [DELETE]
      invalidate_patterns:
        - 'request_cache:user:notifications:{uid}:*'

  exclusions:
    - '/random'
    - '/oauth/'
    - '/login'
    - '/logout'
    - '/create'
    - '/reset_password'
    - '/verify_email'
    - '/change_password'
    - '/send_email_verification'
